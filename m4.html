<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>HITMAN 2 — #4 Chasing a Ghost</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>


:root {
  --red: #c8102e;
  --red-glow: rgba(200,16,46,0.4);
  --red-dim: rgba(200,16,46,0.15);
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --bg: #0e0e0e;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --bg4: #1f1f1f;
  --border: #252525;
  --border-light: #333;
  --text: #f0f0f0;
  --text-muted: #b8b8b8;
  --text-dim: #6a6a6a;
  --blue: #4a9edd;
  --blue-dim: rgba(74,158,221,0.15);
  --green: #4ecb7a;
  --green-dim: rgba(78,203,122,0.12);
  --purple: #a87fd4;
  --purple-dim: rgba(168,127,212,0.12);
  --orange: #e07b3a;
  --orange-dim: rgba(224,123,58,0.12);
  --teal: #4ecfb8;
  --teal-dim: rgba(78,207,184,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}

/* ══ PAGES ══ */
.page{display:none;animation:fadeIn .35s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══ HOME ══ */
#home{min-height:100vh;position:relative}
.home-bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,16,46,.1) 0%,transparent 65%),var(--bg)
}
.home-wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 100px}


/* Mission card */
.mission-card-home{
  position:relative;overflow:hidden;cursor:pointer;
  border:1px solid var(--border);
  transition:border-color .3s,transform .2s;
  animation:slideUp .5s .1s cubic-bezier(.16,1,.3,1) both;
  margin-top:8px
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.mission-card-home:hover{border-color:var(--red);transform:translateY(-2px)}
.mission-card-home:active{transform:scale(.99)}
.mission-cover-home{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .5s;background:var(--bg3)}
.mission-card-home:hover .mission-cover-home{transform:scale(1.03)}
.mission-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.25) 55%,rgba(0,0,0,.08) 100%)}
.red-scan{position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(to right,transparent,var(--red),transparent);animation:scan 3.5s 1s infinite}
@keyframes scan{0%{left:-100%}100%{left:100%}}
.prog-ring-wrap{position:absolute;top:12px;right:12px;width:62px;height:62px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.prog-ring-bg{fill:rgba(40,40,40,.65);stroke:rgba(255,255,255,.12);stroke-width:3}
.prog-ring-fill{fill:none;stroke:var(--red);stroke-width:3.5;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transform:rotate(-90deg);transform-origin:31px 31px;transition:stroke-dashoffset .8s cubic-bezier(.16,1,.3,1)}
.prog-ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;fill:#fff;text-anchor:middle;dominant-baseline:middle}
.mission-info-home{position:absolute;bottom:0;left:0;right:0;padding:18px 20px 20px}
.mission-num-home{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:var(--red);text-transform:uppercase;line-height:1;margin-right:10px;flex-shrink:0}
.mission-title-home{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:#fff;text-transform:uppercase;line-height:1}
.mission-title-home-line{display:flex;align-items:baseline;gap:0;flex-wrap:nowrap}
.mission-loc-home{font-size:13px;color:var(--text-muted);letter-spacing:.08em;margin-top:5px}

/* Missions section label */
.missions-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.45em;color:var(--text-dim);text-transform:uppercase;margin-top:16px;margin-bottom:0;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Missions grid — 2 columns for other missions */
.missions-grid-other{display:block}
.mission-card-sm{position:relative;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:border-color .3s,transform .2s;display:block;width:100%;margin-top:8px}
.mission-card-sm:hover{border-color:rgba(200,16,46,.5);transform:translateY(-2px)}
.mission-card-sm:active{transform:scale(.98)}
.mission-cover-sm{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .5s;background:var(--bg3)}
.mission-card-sm:hover .mission-cover-sm{transform:scale(1.04)}
.mission-overlay-sm{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 60%,transparent 100%)}
.mission-info-sm{position:absolute;bottom:0;left:0;right:0;padding:18px 20px 20px}
.mission-num-sm{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:var(--red);text-transform:uppercase;line-height:1;margin-right:8px;flex-shrink:0}
.mission-title-sm{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:#fff;text-transform:uppercase;line-height:1}
.mission-title-line{display:flex;align-items:baseline;gap:0;flex-wrap:nowrap}
.mission-loc-sm{font-size:13px;color:var(--text-muted);letter-spacing:.07em;margin-top:4px}
.mission-soon-badge{position:absolute;top:14px;right:14px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;background:rgba(0,0,0,.7);border:1px solid var(--border-light);padding:4px 10px;backdrop-filter:blur(6px)}

.home-banner{display:block;width:100%;aspect-ratio:616/353;object-fit:cover;background:var(--bg3);border:1px solid var(--border);margin-bottom:0}
/* Stats */
.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;border:1px solid var(--border);border-top:none;background:var(--border);animation:slideUp .5s .2s cubic-bezier(.16,1,.3,1) both;margin-bottom:0}
.stat-box{background:#222;padding:12px 8px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--red);line-height:1}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-top:3px}


/* ══ MISSION PAGE ══ */
#mission{min-height:100vh;background:var(--bg)}

/* Hero */
.hero{position:relative;height:56vw;min-height:210px;max-height:360px;overflow:hidden}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center 25%;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(0,0,0,.55) 55%,var(--bg) 100%)}
.hero-top{position:absolute;top:0;left:0;right:0;padding:max(env(safe-area-inset-top),12px) 16px 12px;display:flex;align-items:center}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);padding:8px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.25em;color:var(--text-muted);text-transform:uppercase;backdrop-filter:blur(8px);transition:all .2s}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 16px 18px}
.hero-title-line{display:flex;align-items:baseline;gap:0;flex-wrap:nowrap}
.hero-num{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:var(--red);text-transform:uppercase;line-height:1;margin-right:10px;flex-shrink:0}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:900;letter-spacing:.06em;color:#fff;text-transform:uppercase;line-height:1}
.hero-loc{font-size:13px;color:var(--text-muted);letter-spacing:.1em;margin-top:6px}

/* Brief */
.brief-strip{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.brief-text{font-size:13.5px;line-height:1.7;color:var(--text-muted);text-align:justify;text-align-last:left}
.targets-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.targets-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.35em;color:var(--text-dim);text-transform:uppercase}
.chip-pair{display:flex;align-items:center;gap:8px}
.chip-icon{width:36px;height:36px;object-fit:contain;flex-shrink:0}
.target-chip{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.06em;padding:6px 14px 5px;text-transform:uppercase;background:rgba(200,16,46,.85);border:1px solid rgba(200,16,46,.9);color:#fff;display:flex;flex-direction:column;gap:0}
.target-chip-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.35em;color:rgba(255,255,255,.7);text-transform:uppercase;line-height:1;margin-bottom:3px}
.target-chip-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.06em;color:#fff;text-transform:uppercase;line-height:1}
.obj-chip{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.06em;padding:6px 14px 5px;text-transform:uppercase;background:rgba(74,158,221,.75);border:1px solid rgba(74,158,221,.9);color:#fff;display:flex;flex-direction:column;gap:0}
.obj-chip-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.35em;color:rgba(255,255,255,.7);text-transform:uppercase;line-height:1;margin-bottom:3px}
.obj-chip-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.06em;color:#fff;text-transform:uppercase;line-height:1}

/* Overall prog */
.overall-prog{padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.overall-prog-inner{display:flex;align-items:center;justify-content:space-between;padding:9px 0 3px}
.overall-prog-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase}
.overall-prog-val{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--red)}
.prog-track{height:6px;background:rgba(255,255,255,.07);margin-bottom:10px;border-radius:1px}
.prog-fill{height:100%;background:var(--red);transition:width .8s cubic-bezier(.16,1,.3,1);width:0%;border-radius:1px}

/* Content */
.mission-content{max-width:700px;margin:0 auto;padding:0 0 80px}

/* Section */
.section-block{border-bottom:1px solid var(--border)}
.section-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;background:#0a0a0a;transition:background .15s}
.section-header:active{background:#111}
.sec-header-text{flex:1;min-width:0}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.12em;color:#fff;text-transform:uppercase;line-height:1}
.sec-meta{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-top:1px}
.sec-prog{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--text-muted);flex-shrink:0;white-space:nowrap}
.sec-prog span{color:var(--red)}
.sec-chevron{color:var(--text-dim);font-size:11px;flex-shrink:0;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.section-header.open .sec-chevron{transform:rotate(180deg)}
.sec-prog-track{height:1px;background:rgba(255,255,255,.04)}
.sec-prog-fill{height:100%;transition:width .6s cubic-bezier(.16,1,.3,1);width:0%}
.sec-prog-fill-stories{background:var(--red)}
.sec-prog-fill-intel{background:var(--red)}
.sec-prog-fill-challenges{background:var(--red)}
.sec-prog-fill-disguises{background:var(--red)}
.section-body{display:none}
.section-body.open{display:block;animation:bodyOpen .25s cubic-bezier(.16,1,.3,1)}
@keyframes bodyOpen{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── STORIES ── */
.story-item{display:grid;grid-template-columns:110px 1fr;border-bottom:1px solid var(--border);background:var(--bg);transition:background .15s;position:relative;overflow:hidden}
.story-item.completed{opacity:.38}
.story-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);transform:scaleY(0);transform-origin:top;transition:transform .2s}
.story-item:hover::before{transform:scaleY(1)}
.story-thumb-wrap{position:relative;width:110px;flex-shrink:0}
.story-thumb{width:110px;height:100%;min-height:90px;object-fit:cover;display:block;background:var(--bg3)}
.story-check-overlay{position:absolute;top:7px;left:7px;z-index:2}
.story-body{padding:12px 14px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.story-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;color:var(--gold-light);text-transform:uppercase;line-height:1.1}
.story-subtitle-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.3em;color:var(--red);text-transform:uppercase;margin-top:3px}
.story-desc{font-size:11.5px;line-height:1.55;color:#fff;margin-top:6px;text-align:justify;text-align-last:left}

/* ── INTELLIGENCE ── */
.intel-search-wrap{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.intel-search{flex:1;background:transparent;border:none;outline:none;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);padding:4px 0}
.intel-search::placeholder{color:var(--text-dim)}
.intel-search-icon{color:var(--text-dim);font-size:13px;flex-shrink:0}

.intel-item{display:flex;align-items:flex-start;border-bottom:1px solid var(--border);background:var(--bg);transition:background .15s}
.intel-item.completed{opacity:.38}
.intel-check{display:flex;align-items:flex-start;justify-content:center;padding:16px 12px 16px 16px;flex-shrink:0;padding-top:17px}
.intel-body{padding:13px 16px 13px 0;min-width:0;flex:1}
.intel-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;color:var(--gold-light);text-transform:uppercase;line-height:1.15}
.intel-desc{font-size:12px;line-height:1.6;color:#fff;margin-top:3px;text-align:justify;text-align-last:left}

/* ── CHALLENGES ── */
.challenge-filters{display:flex;gap:5px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg3)}
.challenge-filters::-webkit-scrollbar{display:none}
.cf-btn{flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.cf-btn.active,.cf-btn:hover{border-color:var(--red);color:#fff;background:var(--red-dim)}

.challenge-card{border-bottom:1px solid var(--border);background:var(--bg);overflow:hidden}
.challenge-card.completed .challenge-head{opacity:.35}
.challenge-card.completed .challenge-body-content{opacity:.35}
.challenge-head{display:grid;grid-template-columns:56px 1fr auto auto;align-items:center;cursor:pointer;transition:background .15s;min-height:58px}
.challenge-head:active{background:var(--bg3)}
.challenge-thumb-wrap{width:56px;height:56px;overflow:hidden;flex-shrink:0;background:var(--bg3)}
.challenge-thumb{width:56px;height:56px;object-fit:cover;display:block}
.challenge-head-body{padding:9px 8px 9px 13px;min-width:0}
.challenge-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--gold-light);text-transform:uppercase;line-height:1.15;display:flex;align-items:flex-start;gap:6px}
.challenge-type-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.challenge-xp{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--gold);margin-top:2px}
.challenge-check-col{padding:8px 8px;display:flex;align-items:center;flex-shrink:0}
.challenge-expand-col{padding:8px 13px 8px 0;display:flex;align-items:center;flex-shrink:0;color:var(--text-dim);font-size:11px;transition:transform .3s}
.challenge-card.expanded .challenge-expand-col{transform:rotate(180deg)}
.challenge-body-content{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.challenge-card.expanded .challenge-body-content{display:block;animation:bodyOpen .2s ease}
.challenge-desc-text{font-size:13px;line-height:1.65;color:#fff;margin-top:12px;white-space:pre-line;text-align:justify;text-align-last:left}
.challenge-reward-row{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.reward-img{width:72px;height:72px;object-fit:cover;border:1px solid var(--gold);background:var(--bg3);flex-shrink:0}
.reward-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
.reward-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.05em;color:var(--gold-light);text-transform:uppercase}

.dot-A{background:var(--red)}
.dot-D{background:var(--blue)}
.dot-F{background:#ffffff}
.dot-T{background:var(--purple)}
.dot-TC{background:var(--teal)}
.dot-CN{background:var(--orange)}

/* ── DISGUISES ── */
.disguises-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:1px;background:var(--border)}
.disguise-card{background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:14px 8px 12px;gap:8px;transition:background .15s;position:relative}
.disguise-card.completed .disguise-img{filter:grayscale(1) brightness(.45)}
.disguise-card.completed .disguise-name{color:var(--text-dim)}
.disguise-img-wrap{position:relative;width:86px;height:86px}
.disguise-img{width:86px;height:86px;object-fit:cover;object-position:top center;display:block;border:1px solid var(--border);background:var(--bg3)}
.disguise-done-overlay{display:none;position:absolute;inset:0;background:rgba(200,16,46,.35);align-items:center;justify-content:center;font-size:20px}
.disguise-card.completed .disguise-done-overlay{display:flex}
.disguise-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--text-muted);text-transform:uppercase;text-align:center;line-height:1.2}
.disguise-check-pos{position:absolute;top:7px;right:7px}

/* ── CHECKBOX ── */
.custom-check{width:20px;height:20px;border:1.5px solid var(--border-light);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.custom-check:hover{border-color:var(--red);background:rgba(200,16,46,.1)}
.custom-check.checked{border-color:var(--red);background:var(--red)}
.custom-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
/* Checkbox sobre imagem — fundo cinza quando não selecionado */
.story-check-overlay .custom-check,
.disguise-check-pos .custom-check{background:rgba(30,30,30,.72);border-color:rgba(180,180,180,.5)}
.story-check-overlay .custom-check:hover,
.disguise-check-pos .custom-check:hover{background:rgba(200,16,46,.25);border-color:var(--red)}
.story-check-overlay .custom-check.checked,
.disguise-check-pos .custom-check.checked{background:var(--red);border-color:var(--red)}


/* ── GITHUB SYNC ── */
.sync-indicator{position:fixed;bottom:22px;left:18px;display:flex;align-items:center;gap:8px;z-index:200;cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:background .3s;flex-shrink:0}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.off{background:var(--text-dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;transition:color .3s}
.sync-indicator:hover .sync-lbl{color:var(--text-muted)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg3);border:1px solid var(--border-light);max-width:440px;width:100%;padding:28px;position:relative}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.15em;color:var(--gold-light);text-transform:uppercase;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:20px}
.modal-sub a{color:var(--blue);text-decoration:none}
.modal-sub a:hover{text-decoration:underline}
.modal-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg2);border:1px solid var(--border-light);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;margin-bottom:16px}
.modal-input:focus{border-color:var(--red)}
.modal-input::placeholder{color:var(--text-dim)}
.modal-row{display:flex;gap:8px}
.modal-btn{flex:1;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;transition:background .15s}
.modal-btn-save{background:var(--red);color:#fff}
.modal-btn-save:hover{background:#e01535}
.modal-btn-cancel{background:var(--border-light);color:var(--text-muted)}
.modal-btn-cancel:hover{background:var(--border)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}
.modal-status{font-size:12px;margin-top:12px;min-height:16px;color:var(--text-dim)}
.modal-status.ok{color:var(--green)}
.modal-status.err{color:#ff7a8a}
.modal-divider{height:1px;background:var(--border);margin:18px 0}
.modal-danger{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--red);text-transform:uppercase;cursor:pointer;background:none;border:none;padding:0}
.modal-danger:hover{text-decoration:underline}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;right:18px;width:44px;height:44px;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(10px);box-shadow:0 4px 18px rgba(200,16,46,.35)}
.fab.visible{opacity:1;pointer-events:all;transform:translateY(0)}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:36px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase}

/* ══ RESPONSIVE ══ */

  .story-item{grid-template-columns:134px 1fr}

  .disguises-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}

}

const stateM4 = { stories:new Set(), intelligence:new Set(), challenges:new Set(), disguises:new Set() };

function saveStateM4() {
  localStorage.setItem('hitman_m4_v1', JSON.stringify({
    stories:[...stateM4.stories], intelligence:[...stateM4.intelligence],
    challenges:[...stateM4.challenges], disguises:[...stateM4.disguises]
  }));
}
function loadStateM4() {
  try {
    const s = JSON.parse(localStorage.getItem('hitman_m4_v1')||'{}');
    stateM4.stories      = new Set(s.stories||[]);
    stateM4.intelligence = new Set(s.intelligence||[]);
    stateM4.challenges   = new Set(s.challenges||[]);
    stateM4.disguises    = new Set(s.disguises||[]);
  } catch(e){}
}

function mkCheckM4(cat, id) {
  const el = document.createElement('div');
  el.className = 'custom-check' + (stateM4[cat].has(id) ? ' checked' : '');
  el.onclick = function(e) {
    e.stopPropagation();
    if (stateM4[cat].has(id)) { stateM4[cat].delete(id); el.classList.remove('checked'); }
    else { stateM4[cat].add(id); el.classList.add('checked'); }
    saveStateM4(); updateProgressM4();
    const row = el.closest('.story-item,.intel-item,.challenge-card,.disguise-card');
    if (row) row.classList.toggle('completed', stateM4[cat].has(id));
  };
  return el;
}

function updateProgressM4() {
  const cats = [
    ['stories',      'm4-prog-stories',    'm4-pf-stories'],
    ['intelligence', 'm4-prog-intel',      'm4-pf-intel'],
    ['challenges',   'm4-prog-challenges', 'm4-pf-challenges'],
    ['disguises',    'm4-prog-disguises',  'm4-pf-disguises'],
  ];
  cats.forEach(([cat, progId, pfId]) => {
    const total = DATA_M4[cat].length;
    const done  = stateM4[cat].size;
    const prog  = document.getElementById(progId);
    const pf    = document.getElementById(pfId);
    if (prog) prog.innerHTML = `<span>${done}</span> / ${total}`;
    if (pf)   pf.style.width = total ? (done/total*100)+'%' : '0%';
  });
  const allTotal = cats.reduce((s,[cat]) => s + DATA_M4[cat].length, 0);
  const allDone  = cats.reduce((s,[cat]) => s + stateM4[cat].size, 0);
  const pct = allTotal > 0 ? Math.round(allDone/allTotal*100) : 0;
  const opf = document.getElementById('m4-overall-prog-fill');
  const opl = document.getElementById('m4-overall-pct-lbl');
  if (opf) opf.style.width = pct + '%';
  if (opl) opl.textContent = pct + '%';
}

function renderStoriesM4() {
  const c = document.getElementById('m4-stories-container'); if(!c) return;
  c.innerHTML = '';
  DATA_M4.stories.forEach((s,i) => {
    const id = 'm4_story_'+i;
    const el = document.createElement('div');
    el.className = 'story-item' + (stateM4.stories.has(id) ? ' completed' : '');
    const tw = document.createElement('div'); tw.className = 'story-thumb-wrap';
    const img = document.createElement('img'); img.className = 'story-thumb';
    img.src = s.img; img.alt = s.title; img.onerror = function(){ this.style.background='#1a1a1a'; };
    const co = document.createElement('div'); co.className = 'story-check-overlay';
    co.appendChild(mkCheckM4('stories', id));
    tw.appendChild(img); tw.appendChild(co);
    const body = document.createElement('div'); body.className = 'story-body';
    body.innerHTML = `<div class="story-title">${s.title}</div>
      <div class="story-subtitle-tag">${s.subtitle}</div>
      <div class="story-desc">${s.desc}</div>`;
    el.appendChild(tw); el.appendChild(body); c.appendChild(el);
  });
}

function renderIntelM4(filter='') {
  const c = document.getElementById('m4-intel-container'); if(!c) return;
  c.innerHTML = '';
  const lf = filter.toLowerCase();
  DATA_M4.intelligence.forEach((item,i) => {
    if (lf && !item.title.toLowerCase().includes(lf) && !item.desc.toLowerCase().includes(lf)) return;
    const id = 'm4_intel_'+i;
    const el = document.createElement('div');
    el.className = 'intel-item' + (stateM4.intelligence.has(id) ? ' completed' : '');
    const cw = document.createElement('div'); cw.className = 'intel-check';
    cw.appendChild(mkCheckM4('intelligence', id));
    const body = document.createElement('div'); body.className = 'intel-body';
    body.innerHTML = `<div class="intel-title">${item.title}</div><div class="intel-desc">${item.desc}</div>`;
    el.appendChild(cw); el.appendChild(body); c.appendChild(el);
  });
  if (!c.children.length) c.innerHTML = '<div class="empty-state">Nenhum resultado encontrado</div>';
}
function filterIntelM4(v) { renderIntelM4(v); }

function renderChallengesM4(typeFilter) {
  const c = document.getElementById('m4-challenges-container'); if(!c) return;
  c.innerHTML = '';
  DATA_M4.challenges.forEach((ch,i) => {
    if (typeFilter && ch.type !== typeFilter) return;
    const id = 'm4_challenge_'+i;
    const card = document.createElement('div');
    card.className = 'challenge-card' + (stateM4.challenges.has(id) ? ' completed' : '');
    const head = document.createElement('div'); head.className = 'challenge-head';
    head.onclick = function(){ card.classList.toggle('expanded'); };
    const tw = document.createElement('div'); tw.className = 'challenge-thumb-wrap';
    const thumb = document.createElement('img'); thumb.className = 'challenge-thumb';
    thumb.src = ch.img; thumb.alt = ch.name; thumb.onerror = function(){ this.style.background='#1a1a1a'; };
    tw.appendChild(thumb);
    const hb = document.createElement('div'); hb.className = 'challenge-head-body';
    hb.innerHTML = `<div class="challenge-name"><span class="challenge-type-dot dot-${ch.type}"></span>${ch.name}</div>
      <div class="challenge-xp">${ch.xp}</div>`;
    const cc = document.createElement('div'); cc.className = 'challenge-check-col';
    cc.appendChild(mkCheckM4('challenges', id));
    const ec = document.createElement('div'); ec.className = 'challenge-expand-col'; ec.innerHTML = '▼';
    head.appendChild(tw); head.appendChild(hb); head.appendChild(cc); head.appendChild(ec);
    const body = document.createElement('div'); body.className = 'challenge-body-content';
    const lines = ch.desc.split('\n');
    const rest = lines.slice(1);
    const descHtml = rest.length
      ? `<ul style="margin:6px 0 0 16px;padding:0">${rest.map(l=>`<li>${l}</li>`).join('')}</ul>`
      : '';
    body.innerHTML = `<div class="challenge-desc-text">${lines[0]}${descHtml}</div>`;
    card.appendChild(head); card.appendChild(body); c.appendChild(card);
  });
}
function filterChallengesM4(btn, type) {
  document.querySelectorAll('#m4-body-challenges .cf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChallengesM4(type);
}

function renderDisguisesM4() {
  const c = document.getElementById('m4-disguises-container'); if(!c) return;
  c.innerHTML = '';
  DATA_M4.disguises.forEach((d,i) => {
    const id = 'm4_disguise_'+i;
    const card = document.createElement('div');
    card.className = 'disguise-card' + (stateM4.disguises.has(id) ? ' completed' : '');
    card.onclick = function(e) {
      if (e.target.closest('.disguise-check-pos')) return;
      const chkEl = card.querySelector('.custom-check');
      if (!chkEl) return;
      if (stateM4['disguises'].has(id)) { stateM4['disguises'].delete(id); chkEl.classList.remove('checked'); }
      else { stateM4['disguises'].add(id); chkEl.classList.add('checked'); }
      saveStateM4();
      card.classList.toggle('completed', stateM4['disguises'].has(id));
      updateProgressM4();
    };
    const wrap = document.createElement('div'); wrap.className = 'disguise-img-wrap';
    const img = document.createElement('img'); img.className = 'disguise-img';
    img.src = d.img; img.alt = d.name; img.onerror = function(){ this.style.background='#1a1a1a'; };
    const done = document.createElement('div'); done.className = 'disguise-done-overlay'; done.textContent = '✓';
    const chkPos = document.createElement('div'); chkPos.className = 'disguise-check-pos';
    chkPos.appendChild(mkCheckM4('disguises', id));
    wrap.appendChild(img); wrap.appendChild(done);
    const name = document.createElement('div'); name.className = 'disguise-name'; name.textContent = d.name;
    card.appendChild(wrap); card.appendChild(name); card.appendChild(chkPos);
    c.appendChild(card);
  });
}

// ── INIT M4 ──
loadStateM4();
renderStoriesM4();
renderIntelM4();
renderChallengesM4('');
renderDisguisesM4();
updateProgressM4();
</script>
